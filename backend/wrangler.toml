name = "hdb-resale-visualizer-backend"
main = "src/index.ts"
compatibility_date = "2026-04-29"

[vars]
# Set this to your frontend origin in production, e.g. https://your-app.pages.dev
APP_ORIGIN = ""

[[d1_databases]]
binding = "DB"
database_name = "hdb-resale-visualizer-db"
database_id = "your-database-id-here" # Users will need to update this or create a new one
migrations_dir = "migrations"
