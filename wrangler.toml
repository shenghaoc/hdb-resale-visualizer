name = "hdb-resale-visualizer"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# The runtime D1 binding consumed by Pages Functions under `functions/api/*`.
# The `database_id` for production must be configured in the Cloudflare Pages
# dashboard (or via `wrangler pages project create`); the value below is a
# placeholder that `wrangler pages dev` uses for the local-only SQLite shadow.
[[d1_databases]]
binding = "DB"
database_name = "hdb-resale"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
