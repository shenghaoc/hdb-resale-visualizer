name: Refresh Official Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Restore or sync official datasets
        id: sync
        uses: ./.github/actions/restore-or-sync-data
        with:
          data-gov-api-key: ${{ secrets.DATA_GOV_API_KEY }}
          geocode-concurrency: "10"

      - name: Build app
        if: steps.sync.outputs.changed == 'true'
        run: npm run build

      - id: deploy_ready
        name: Check deploy secrets
        if: steps.sync.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ] && [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.sync.outputs.changed == 'true' && steps.deploy_ready.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --no-install wrangler pages deploy dist --project-name hdb-resale-visualizer
