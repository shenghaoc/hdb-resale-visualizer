name: Refresh Official Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Compute pipeline cache key prefix
        id: pipeline-cache
        run: |
          echo "prefix=pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('package-lock.json', 'scripts/sync-data.ts', 'scripts/lib/**/*.ts', 'src/types/data.ts', 'src/lib/filterOptions.ts', 'src/lib/utils.ts', 'src/lib/mrt-colors.ts') }}" >> "$GITHUB_OUTPUT"

      - name: Restore pipeline cache
        uses: actions/cache/restore@v5
        id: pipeline-cache-restore
        with:
          path: |
            data/cache
            public/data
          key: ${{ steps.pipeline-cache.outputs.prefix }}-seed
          restore-keys: |
            ${{ steps.pipeline-cache.outputs.prefix }}-
            pipeline-cache-v2-${{ runner.os }}-

      - name: Check if pipeline cache was restored
        id: cache-presence
        run: |
          if [ -f public/data/manifest.json ]; then
            echo "restored=true" >> "$GITHUB_OUTPUT"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify cached data artifacts
        if: steps.cache-presence.outputs.restored == 'true'
        id: data-check
        continue-on-error: true
        run: npm run check:data

      - name: Record upstream timestamp before sync
        id: pre-sync
        run: |
          prev=$(jq -r '.sources.lastUpdatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          echo "upstream_at=$prev" >> "$GITHUB_OUTPUT"

      - name: Sync official datasets (force)
        if: steps.cache-presence.outputs.restored != 'true' || steps.data-check.outcome != 'success'
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          GEOCODE_CONCURRENCY: "10"
        run: npm run sync-data -- --force

      - name: Sync official datasets
        if: steps.cache-presence.outputs.restored == 'true' && steps.data-check.outcome == 'success'
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          GEOCODE_CONCURRENCY: "10"
        run: npm run sync-data

      - id: diff
        name: Detect data changes
        run: |
          new_at=$(jq -r '.sources.lastUpdatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          if [ "$new_at" != "${{ steps.pre-sync.outputs.upstream_at }}" ] || [ "${{ steps.data-check.outcome }}" != "success" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute pipeline cache save key
        if: steps.diff.outputs.changed == 'true'
        id: pipeline-cache-save-key
        run: |
          upstream_at=$(jq -r '.sources.lastUpdatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          upstream_key=$(echo "$upstream_at" | tr -cd '0-9')
          if [ -z "$upstream_key" ]; then
            upstream_key="unknown"
          fi
          generated_at=$(jq -r '.generatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          generated_key=$(echo "$generated_at" | tr -cd '0-9')
          if [ -z "$generated_key" ]; then
            generated_key="${{ github.run_id }}"
          fi
          echo "upstream_key=$upstream_key" >> "$GITHUB_OUTPUT"
          echo "generated_key=$generated_key" >> "$GITHUB_OUTPUT"

      - name: Save pipeline cache
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            data/cache
            public/data
          key: ${{ steps.pipeline-cache.outputs.prefix }}-${{ steps.pipeline-cache-save-key.outputs.upstream_key }}-${{ steps.pipeline-cache-save-key.outputs.generated_key }}

      - name: Build app
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - id: deploy_ready
        name: Check deploy secrets
        if: steps.diff.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ] && [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.diff.outputs.changed == 'true' && steps.deploy_ready.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --no-install wrangler pages deploy dist --project-name hdb-resale-visualizer
