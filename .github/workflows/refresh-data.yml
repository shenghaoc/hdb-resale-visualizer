name: Refresh Official Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore geocode cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/cache
            public/data/manifest.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: geocode-cache-

      - name: Hash manifest before sync
        id: pre-sync
        run: |
          if [ -f public/data/manifest.json ]; then
            echo "hash=$(sha256sum public/data/manifest.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "hash=" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync official datasets
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          ONEMAP_SEARCH_ENDPOINT: ${{ secrets.ONEMAP_SEARCH_ENDPOINT }}
          GEOCODE_CONCURRENCY: "10"
        run: bun run sync-data

      - name: Save geocode cache
        uses: actions/cache/save@v5
        with:
          path: |
            data/cache
            public/data/manifest.json
          key: geocode-cache-${{ github.run_id }}

      - id: diff
        name: Detect data changes
        run: |
          if [ -f public/data/manifest.json ]; then
            new_hash=$(sha256sum public/data/manifest.json | cut -d' ' -f1)
          else
            new_hash=""
          fi
          if [ "$new_hash" != "${{ steps.pre-sync.outputs.hash }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app
        if: steps.diff.outputs.changed == 'true'
        run: bun run build

      - id: deploy_ready
        name: Check deploy secrets
        if: steps.diff.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.diff.outputs.changed == 'true' && steps.deploy_ready.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist --project-name hdb-resale-visualizer
