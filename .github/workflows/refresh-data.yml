name: Refresh Official Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Sync upstream datasets into D1
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          ONEMAP_EMAIL: ${{ secrets.ONEMAP_EMAIL }}
          ONEMAP_PASSWORD: ${{ secrets.ONEMAP_PASSWORD }}
          ONEMAP_TOKEN: ${{ secrets.ONEMAP_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          GEOCODE_CONCURRENCY: "10"
        run: vp run sync-data

      # The Worker reads live data from D1, so no redeploy is needed on
      # data-only refreshes. The UI bundle redeploys only when source code
      # changes — handled by Cloudflare Workers Builds, not GitHub Actions.
