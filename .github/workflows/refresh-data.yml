name: Refresh Official Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore pipeline cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/cache
            public/data
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: pipeline-cache-

      - name: Record upstream timestamp before sync
        id: pre-sync
        run: |
          prev=$(jq -r '.sources.lastUpdatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          echo "upstream_at=$prev" >> "$GITHUB_OUTPUT"

      - name: Sync official datasets
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          GEOCODE_CONCURRENCY: "10"
        run: bun run sync-data

      - name: Save pipeline cache
        uses: actions/cache/save@v5
        with:
          path: |
            data/cache
            public/data
          key: pipeline-cache-${{ github.run_id }}

      - id: diff
        name: Detect data changes
        run: |
          new_at=$(jq -r '.sources.lastUpdatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          if [ "$new_at" != "${{ steps.pre-sync.outputs.upstream_at }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app
        if: steps.diff.outputs.changed == 'true'
        run: bun run build

      - id: deploy_ready
        name: Check deploy secrets
        if: steps.diff.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ] && [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.diff.outputs.changed == 'true' && steps.deploy_ready.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist --project-name hdb-resale-visualizer
