name: CI

on:
  pull_request:
    paths: &ci_paths
      - 'src/**'
      - 'functions/**'
      - 'worker/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'types/**'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'wrangler.*'
  push:
    branches:
      - main
      - master
    paths: *ci_paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Paths filter ────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}
      run_build: ${{ steps.filter.outputs.build }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              # App shell / entry points
              - 'src/App.tsx'
              - 'src/main.tsx'
              - 'src/styles.css'
              # Feature-first buyer workflows (target architecture)
              - 'src/features/listing-check/**'
              - 'src/features/shortlist/**'
              - 'src/features/search-profile/**'
              - 'src/features/map-explorer/**'
              - 'src/entities/**'
              - 'src/shared-ui/**'
              - 'src/shared/**'
              # Legacy layout (still present during the restructure)
              - 'src/components/**'
              - 'src/hooks/**'
              - 'src/lib/**'
              - 'src/types/**'
              # Shared domain logic that drives listing-check results
              - 'shared/**'
              # E2E harness, fixtures, and workflow self-change
              # (functions/** omitted on purpose: E2E mocks /api/*)
              - 'tests/e2e/**'
              - 'tests/fixtures/**'
              - 'playwright.config.*'
              - '.github/workflows/ci.yml'
            build:
              - 'src/**'
              - 'shared/**'
              - 'functions/**'
              - 'worker/**'
              - 'scripts/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'wrangler.*'
              - '.github/workflows/ci.yml'

  # ── Quality gates (all parallel, all merge-required) ────────────────────────
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and integration tests
        run: npm run test

  # ── Build (also gates merge; artifact consumed by e2e-smoke) ────────────────
  #
  # Runs when either build or e2e paths changed, so e2e-smoke always has an
  # artifact to download even when only test files (not src) changed.
  build:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.run_build == 'true' ||
      needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fixtures must be staged before vite build so they are copied into dist/
      # and served by vite preview without a second staging step in e2e-smoke.
      - name: Stage E2E fixtures into public/api
        run: npm run setup:fixtures

      - name: Production build
        run: npm run build:deploy

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── E2E smoke (depends only on build artifact, not on lint/typecheck/unit) ──
  #
  # Uses the official Playwright Docker image so browser binaries and system
  # dependencies for WebKit are pre-installed; no `playwright install` step
  # needed.  The @playwright/test version is pinned exactly to 1.60.0 in
  # package.json to match the mcr.microsoft.com/playwright:v1.60.0-noble image.
  #
  # On PR / push: runs the smoke subset (production-bootstrap + app + a11y).
  # On workflow_dispatch: runs the full suite.
  e2e-smoke:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    needs: [changes, build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      # Install Node 26 inside the Playwright Docker container (which ships a
      # lower LTS version) so the project's engines requirement is satisfied.
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Browsers are already in the Docker image; skip the post-install
          # download that @playwright/test would otherwise trigger.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: End-to-end smoke (PR / push)
        if: github.event_name != 'workflow_dispatch'
        run: npm run test:e2e:smoke
        env:
          E2E_DIST_PREBUILT: "1"

      - name: End-to-end full suite (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:e2e
        env:
          E2E_DIST_PREBUILT: "1"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Docs freshness reminder (PR only, not a merge gate) ─────────────────────
  docs-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for docs update
        id: docs
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          SRC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'src/' 'functions/' | wc -l | tr -d ' ')
          DOCS_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'docs/guide/' | wc -l | tr -d ' ')
          echo "src_changed=$SRC_CHANGED" >> "$GITHUB_OUTPUT"
          echo "docs_changed=$DOCS_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Post reminder comment
        if: >-
          steps.docs.outputs.src_changed != '0'
          && steps.docs.outputs.docs_changed == '0'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- docs-freshness-check -->';
            if (comments.some(c => c.body.includes(marker))) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${marker}\n📝 **Docs reminder** — This PR changes \`src/\` or \`functions/\` but does not update \`docs/guide/\`. If the change affects user-facing behaviour, please update the [user guide](../blob/main/docs/guide/user-guide.md).`,
            });
