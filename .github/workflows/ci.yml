name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "public/**"
      - ".github/workflows/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.*"
      - "playwright.config.*"
      - "eslint.config.*"
      - "vitest.config.*"
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "public/**"
      - ".github/workflows/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.*"
      - "playwright.config.*"
      - "eslint.config.*"
      - "vitest.config.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit and integration tests
        run: bun run test

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: End-to-end smoke
        run: bun run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-and-deploy:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deploy target
        id: deploy-target
        run: |
          should_deploy=false
          target_branch=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              should_deploy=true
              target_branch="${{ github.head_ref }}"
            fi
          elif [ "${{ github.ref_name }}" = "main" ]; then
            should_deploy=true
            target_branch="main"
          fi

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "branch=$target_branch" >> "$GITHUB_OUTPUT"

      - name: Restore pipeline cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/cache
            public/data
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: pipeline-cache-

      - name: Sync official datasets
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          ONEMAP_SEARCH_ENDPOINT: ${{ secrets.ONEMAP_SEARCH_ENDPOINT }}
          GEOCODE_CONCURRENCY: "10"
        run: bun run sync-data

      - name: Build
        run: bun run build:deploy

      - name: Save pipeline cache
        if: steps.deploy-target.outputs.should_deploy == 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            data/cache
            public/data
          key: pipeline-cache-${{ github.run_id }}

      - name: Deploy to Cloudflare Pages
        if: steps.deploy-target.outputs.should_deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist --project-name=hdb-resale-visualizer --branch="${{ steps.deploy-target.outputs.branch }}"
