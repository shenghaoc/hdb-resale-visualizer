name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.*"
      - "playwright.config.*"
      - "eslint.config.*"
      - "vitest.config.*"
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.*"
      - "playwright.config.*"
      - "eslint.config.*"
      - "vitest.config.*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      R2_ARTIFACTS_OBJECT_KEY: hdb-resale-visualizer/public-data.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifact snapshot
        env:
          R2_ARTIFACTS_PUBLIC_URL: ${{ vars.R2_ARTIFACTS_PUBLIC_URL }}
          R2_ARTIFACTS_BUCKET: ${{ vars.R2_ARTIFACTS_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run artifacts:download

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit and integration tests
        run: bun run test

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: End-to-end smoke
        run: bun run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Production build
        run: bun run build
