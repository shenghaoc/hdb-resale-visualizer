name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'functions/**'
      - 'scripts/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'types/**'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'vitest.config.*'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'types/**'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'vitest.config.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}
      run_build: ${{ steps.filter.outputs.build }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/App.tsx'
              - 'src/main.tsx'
              - 'src/styles.css'
              - 'src/components/**'
              - 'src/hooks/**'
              - 'src/lib/**'
              - 'src/types/**'
              - 'tests/e2e/**'
              - 'tests/fixtures/public-data/**'
              - 'shared/**'
              - 'playwright.config.*'
              - '.github/workflows/ci.yml'
            build:
              - 'src/**'
              - 'scripts/**'
              - 'shared/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - '.github/workflows/ci.yml'

  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright binaries
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps webkit

      - name: End-to-end smoke (incl. axe WCAG gate)
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-verify:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_build == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build verification
        run: npm run build:deploy

  docs-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for docs update
        id: docs
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          SRC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'src/' 'functions/' | wc -l | tr -d ' ')
          DOCS_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'docs/guide/' | wc -l | tr -d ' ')
          echo "src_changed=$SRC_CHANGED" >> "$GITHUB_OUTPUT"
          echo "docs_changed=$DOCS_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Post reminder comment
        if: >-
          steps.docs.outputs.src_changed != '0'
          && steps.docs.outputs.docs_changed == '0'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- docs-freshness-check -->';
            if (comments.some(c => c.body.includes(marker))) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${marker}\n📝 **Docs reminder** — This PR changes \`src/\` or \`functions/\` but does not update \`docs/guide/\`. If the change affects user-facing behaviour, please update the [user guide](../blob/main/docs/guide/user-guide.md).`,
            });
