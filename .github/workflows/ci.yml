name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'vitest.config.*'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'vitest.config.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}
      run_build: ${{ steps.filter.outputs.build }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/App.tsx'
              - 'src/main.tsx'
              - 'src/index.css'
              - 'src/components/**'
              - 'src/hooks/**'
              - 'src/lib/**'
              - 'tests/e2e/**'
              - 'tests/fixtures/public-data/**'
              - 'shared/**'
              - 'playwright.config.*'
              - '.github/workflows/ci.yml'
            build:
              - 'src/**'
              - 'scripts/**'
              - 'shared/**'
              - 'public/**'
              - 'tests/fixtures/public-data/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - '.github/workflows/ci.yml'

  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end smoke
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-verify:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_build == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Seed fixture data for build verification
        run: |
          rm -rf public/data
          mkdir -p public/data
          cp -R tests/fixtures/public-data/. public/data/

      - name: Production build verification
        run: npm run build:deploy
