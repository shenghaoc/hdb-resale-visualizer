name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'vitest.config.*'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'index.html'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - 'vitest.config.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit and integration tests
        run: bun run test

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: End-to-end smoke
        run: bun run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-and-deploy:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deploy target
        id: deploy-target
        run: |
          should_deploy=false
          target_branch=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              should_deploy=true
              target_branch="${{ github.head_ref }}"
            fi
          elif [ "${{ github.ref_name }}" = "main" ]; then
            should_deploy=true
            target_branch="main"
          fi

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "branch=$target_branch" >> "$GITHUB_OUTPUT"

      - name: Compute pipeline cache key prefix
        if: steps.deploy-target.outputs.should_deploy == 'true'
        id: pipeline-cache
        run: |
          echo "prefix=pipeline-cache-v2-${{ runner.os }}-${{ hashFiles('bun.lock', 'scripts/sync-data.ts', 'scripts/lib/**/*.ts', 'src/types/data.ts', 'src/lib/filterOptions.ts', 'src/lib/utils.ts', 'src/lib/mrt-colors.ts') }}" >> "$GITHUB_OUTPUT"

      - name: Restore pipeline cache
        if: steps.deploy-target.outputs.should_deploy == 'true'
        uses: actions/cache/restore@v5
        id: pipeline-cache-restore
        with:
          path: |
            data/cache
            public/data
          key: ${{ steps.pipeline-cache.outputs.prefix }}-seed
          restore-keys: |
            ${{ steps.pipeline-cache.outputs.prefix }}-

      - name: Check if pipeline cache was restored
        if: steps.deploy-target.outputs.should_deploy == 'true'
        id: cache-presence
        run: |
          if [ -f public/data/manifest.json ]; then
            echo "restored=true" >> "$GITHUB_OUTPUT"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify cached data artifacts
        if: steps.deploy-target.outputs.should_deploy == 'true' && steps.cache-presence.outputs.restored == 'true'
        id: data-check
        continue-on-error: true
        run: bun run check:data

      - name: Sync official datasets
        if: steps.deploy-target.outputs.should_deploy == 'true' && (steps.cache-presence.outputs.restored != 'true' || steps.data-check.outcome != 'success')
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          ONEMAP_SEARCH_ENDPOINT: ${{ secrets.ONEMAP_SEARCH_ENDPOINT }}
          GEOCODE_CONCURRENCY: '10'
        run: bun run sync-data

      - name: Seed fixture data for non-deploy build
        if: steps.deploy-target.outputs.should_deploy != 'true'
        run: |
          rm -rf public/data
          mkdir -p public/data
          cp -R tests/fixtures/public-data/. public/data/

      - name: Build
        run: bun run build:deploy

      - name: Compute pipeline cache save key
        if: steps.deploy-target.outputs.should_deploy == 'true' && steps.data-check.outcome != 'success' && github.event_name != 'pull_request'
        id: pipeline-cache-save-key
        run: |
          upstream_at=$(jq -r '.sources.lastUpdatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          upstream_key=$(echo "$upstream_at" | tr -cd '0-9')
          if [ -z "$upstream_key" ]; then
            upstream_key="unknown"
          fi
          generated_at=$(jq -r '.generatedAt // ""' public/data/manifest.json 2>/dev/null || echo "")
          generated_key=$(echo "$generated_at" | tr -cd '0-9')
          if [ -z "$generated_key" ]; then
            generated_key="${{ github.run_id }}"
          fi
          echo "upstream_key=$upstream_key" >> "$GITHUB_OUTPUT"
          echo "generated_key=$generated_key" >> "$GITHUB_OUTPUT"

      - name: Save pipeline cache
        if: steps.deploy-target.outputs.should_deploy == 'true' && steps.data-check.outcome != 'success' && github.event_name != 'pull_request'
        uses: actions/cache/save@v5
        with:
          path: |
            data/cache
            public/data
          key: ${{ steps.pipeline-cache.outputs.prefix }}-${{ steps.pipeline-cache-save-key.outputs.upstream_key }}-${{ steps.pipeline-cache-save-key.outputs.generated_key }}

      - name: Deploy to Cloudflare Pages
        if: steps.deploy-target.outputs.should_deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist --project-name=hdb-resale-visualizer --branch="${{ steps.deploy-target.outputs.branch }}"
