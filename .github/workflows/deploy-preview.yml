name: Deploy Preview

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository) ||
          (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
        )
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_run'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          package-manager-cache: false

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Resolve deploy branch
        id: deploy-branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          DISPATCH_REF: ${{ github.ref_name }}
        run: |
          target_branch=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            target_branch="$DISPATCH_REF"
          else
            # workflow_run: match the triggering CI run (PR head branch or main on push).
            target_branch="$WORKFLOW_HEAD_BRANCH"
            if [ -z "$target_branch" ]; then
              echo "::error::workflow_run.head_branch was empty; cannot set Cloudflare Pages branch"
              exit 1
            fi
          fi

          echo "branch=$target_branch" >> "$GITHUB_OUTPUT"

      - name: Restore or sync official datasets
        id: sync
        uses: ./.github/actions/restore-or-sync-data
        with:
          data-gov-api-key: ${{ secrets.DATA_GOV_API_KEY }}
          onemap-search-endpoint: ${{ secrets.ONEMAP_SEARCH_ENDPOINT }}
          geocode-concurrency: "10"

      - name: Build
        run: npm run build:deploy

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --no-install wrangler pages deploy dist --project-name=hdb-resale-visualizer --branch="${{ steps.deploy-branch.outputs.branch }}"
