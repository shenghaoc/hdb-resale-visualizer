name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !contains(github.event.comment.body, 'review') &&
       github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !contains(github.event.comment.body, 'review') &&
       github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       !contains(github.event.review.body, 'review') &&
       github.event.review.author_association == 'OWNER') ||
      (github.event_name == 'issues' &&
       (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
       !(contains(github.event.issue.body, 'review') || contains(github.event.issue.title, 'review')) &&
       github.event.issue.author_association == 'OWNER')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: |
            --max-turns 40
            --allowedTools "Skill,Task,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr review:*),mcp__github_inline_comment__create_inline_comment"
            --system-prompt "You are the repo's Claude assistant. When the user asks for a pull request review (for example '@claude review'), run the /review-pr command for the current PR before doing anything else. For other requests, follow the user's comment. Never edit files under .github/workflows/."
          settings: |
            {
              "permissions": {
                "deny": ["Edit(.github/workflows/*)", "Write(.github/workflows/*)"]
              }
            }

  claude-review:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(github.event.comment.body, 'review') &&
       github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(github.event.comment.body, 'review') &&
       github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       contains(github.event.review.body, 'review') &&
       github.event.review.author_association == 'OWNER')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run PR review command
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Read and follow @AGENTS.md and @CLAUDE.md.

            The PR branch is already checked out. Run `/review-pr` for this pull request.
          claude_args: |
            --max-turns 40
            --allowedTools "Skill,Task,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr review:*),mcp__github_inline_comment__create_inline_comment"
