name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       github.event.review.author_association == 'OWNER') ||
      (github.event_name == 'issues' &&
       (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
       github.event.issue.author_association == 'OWNER')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: 'true'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Read and follow the repository policy in @CLAUDE.md and @AGENTS.md before starting.

            Key architectural constraints:
            - 100% static frontend (Bun-only, no backend routes)
            - All data precomputed in `scripts/sync-data.ts` → `public/data/` artifacts
            - No runtime fetching or geocoding (must use precomputed build artifacts)
            - TypeScript strict mode, React 19 best practices
            - OneMap attribution must be preserved on map renders
            - No price-prediction or forecasting features

            When reviewing code or providing implementation guidance:
            - Catch functional bugs, logic errors, and edge cases
            - Flag React performance issues (unnecessary rerenders, missing memoization, expensive render-path work)
            - Enforce TypeScript strictness (no `any`, exhaustive checks)
            - Verify data pipeline contracts (schema alignment between scripts and src)
            - Alert on package-manager drift (Bun-only, no npm/yarn/pnpm lockfiles)
            - Block runtime API calls for core domain data
            - Require tests for non-trivial logic changes
            - Skip nitpicks unless they materially hurt readability
          claude_args: '--max-turns 25'
          settings: |
            {
              "permissions": {
                "deny": ["Edit(.github/workflows/*)", "Write(.github/workflows/*)"]
              }
            }
