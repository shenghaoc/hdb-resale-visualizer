name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip deployment for fork PRs (secrets are not available)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/cache
            public/data
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: pipeline-cache-

      - name: Sync official datasets
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          ONEMAP_SEARCH_ENDPOINT: ${{ secrets.ONEMAP_SEARCH_ENDPOINT }}
          GEOCODE_CONCURRENCY: "10"
        run: bun run sync-data

      - name: Verify data artifacts
        run: bun run check:data

      - name: Build
        run: bun run build:deploy

      - name: Save pipeline cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/cache
            public/data
          key: pipeline-cache-${{ github.run_id }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx wrangler pages deploy dist --project-name=hdb-resale-visualizer --branch="${{ github.head_ref }}"
          else
            bunx wrangler pages deploy dist --project-name=hdb-resale-visualizer --branch=main
          fi
