name: E2E

# Repo-specific Playwright smoke gate, kept separate from the universal base
# CI (.github/workflows/ci.yml), which runs `vp install` + `vp check` on
# every PR with no path filters.
#
# On PR / push: runs the smoke subset (production-bootstrap + app + a11y) when
# UI-affecting paths changed. On workflow_dispatch: runs the full suite.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              # App shell / entry points
              - 'src/App.tsx'
              - 'src/main.tsx'
              - 'src/styles.css'
              # Feature-first layout (target architecture)
              - 'src/features/**'
              - 'src/entities/**'
              - 'src/shared/**'
              - 'src/shared-ui/**'
              # Legacy layout (still present during the restructure)
              - 'src/components/**'
              - 'src/hooks/**'
              - 'src/types/**'
              # Shared domain logic that drives listing-check results
              - 'shared/**'
              # E2E harness, fixtures, and workflow self-change
              # (functions/** omitted on purpose: E2E mocks /api/*)
              - 'tests/e2e/**'
              - 'tests/fixtures/**'
              - 'playwright.config.*'
              - '.github/workflows/e2e.yml'
              # Vitest Browser Mode tests and their config
              - 'tests/browser/**'
              - 'vitest.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # Builds the dist artifact consumed by e2e-smoke. Fixtures must be staged
  # before the build so they are copied into dist/ and served by vite preview
  # without a second staging step in e2e-smoke.
  build:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Stage E2E fixtures into public/api
        run: vp run setup:fixtures

      - name: Production build
        run: vp run build:deploy

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Uses the official Playwright Docker image so Chromium browser binaries and
  # system dependencies are pre-installed; no `playwright install` step needed.
  # The @playwright/test version is pinned exactly to 1.60.0 in package.json
  # to match the mcr.microsoft.com/playwright:v1.60.0-noble image.
  e2e-smoke:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    needs: [changes, build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install
        env:
          # Browsers are already in the Docker image; skip the post-install
          # download that @playwright/test would otherwise trigger.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: End-to-end smoke (PR / push)
        if: github.event_name != 'workflow_dispatch'
        run: vp exec playwright test tests/e2e/production-bootstrap.spec.ts tests/e2e/app.spec.ts tests/e2e/accessibility.spec.ts
        env:
          E2E_DIST_PREBUILT: "1"

      - name: End-to-end full suite (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: vp exec playwright test
        env:
          E2E_DIST_PREBUILT: "1"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Vitest Browser Mode — real-browser component/integration tests.
  # Separate from E2E (which tests full user flows) and from base CI
  # (which runs jsdom unit tests only).
  browser-tests:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.run_e2e == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(vpx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium for Vitest Browser Mode
        run: vp exec playwright install --with-deps chromium

      - name: Browser-mode tests
        run: vp test run --browser=chromium tests/browser
        env:
          VITEST_BROWSER: "1"
