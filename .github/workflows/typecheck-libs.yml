name: Strict dependency typecheck

# Runs TypeScript with skipLibCheck:false using a CommonJS module target so vendor
# export= typings (e.g. echarts root) still parse; complements the faster default
# `pnpm run typecheck` on every PR.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  typecheck-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Strict lib typecheck (skipLibCheck false)
        run: vp run typecheck:libs
