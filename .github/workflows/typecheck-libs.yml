name: Strict dependency typecheck

# Runs TypeScript with skipLibCheck:false using a CommonJS module target so vendor
# export= typings (e.g. echarts root) still parse; complements the faster default
# `pnpm run typecheck` on every PR.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  typecheck-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm ci

      - name: Strict lib typecheck (skipLibCheck false)
        run: pnpm run typecheck:libs
