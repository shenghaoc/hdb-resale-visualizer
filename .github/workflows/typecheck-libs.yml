name: App source lib typecheck

# Runs the app/source TypeScript graph with the same Vite-era ESM + Bundler
# settings as the browser build. skipLibCheck stays enabled here so this gate
# focuses on repo-owned source rather than third-party declaration internals.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  typecheck-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: App/source lib typecheck
        run: vp run typecheck:libs
