# Automated PR review via the Anthropic "code-review" marketplace plugin.
#
# Why code-review instead of pr-review-toolkit?
# - code-review is built for GitHub PRs: skip drafts/duplicates, diff-focused agents,
#   and explicit gh + inline-comment tooling (see plugin command).
# - pr-review-toolkit is broader (six specialist agents) and better for interactive,
#   repo-wide prompts; its bundled /pr-review-toolkit:review-pr flow is lighter on
#   gh posting guarantees than /code-review:code-review --comment.
# Cost control: only non-draft PRs you open on this repo (OWNER + same-repo guard).

name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "public/**"
      - "functions/**"
      - "worker/**"
      - "shared/**"
      - "migrations/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "playwright.config.*"
      - "eslint.config.*"
      - "vitest.config.*"
      - ".github/workflows/**"
      - "wrangler.toml"
      - "wrangler.jsonc"

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.author_association == 'OWNER'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude code-review plugin
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: "true"
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: |
            /code-review:code-review https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment
          claude_args: |
            --max-turns 40
            --allowedTools "Skill,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),mcp__github_inline_comment__create_inline_comment"
