name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "*.ts"
      - "*.tsx"
      - "*.js"
      - "*.jsx"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "wrangler.toml"
      - "wrangler.jsonc"

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the changed files in this PR for bugs, type errors, and violations of the
            architectural constraints in CLAUDE.md (zero runtime APIs, build-time data only,
            no geocoding in src/, browser-local state). Skip generated files under public/data/.
            Post inline comments on specific lines where issues exist, and a brief overall summary.
            Do not approve or merge. Do not commit, push, or modify any file.
          claude_args: '--max-turns 5'
